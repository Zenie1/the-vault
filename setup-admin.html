<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vault — Admin Hash Setup</title>
<style>
  body {
    font-family: monospace;
    background: #0a0408;
    color: #ede4d3;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
  }
  .box {
    background: #14080f;
    border: 1px solid rgba(196,30,58,0.3);
    padding: 40px 48px;
    max-width: 520px;
    width: 100%;
    text-align: center;
  }
  h1 { font-size: 18px; letter-spacing: 4px; color: #c41e3a; margin-bottom: 8px; }
  .sub { font-size: 11px; color: #6b4a55; letter-spacing: 2px; margin-bottom: 32px; }
  #status {
    font-size: 13px;
    letter-spacing: 1px;
    line-height: 1.8;
    min-height: 60px;
    padding: 16px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(0,0,0,0.3);
    text-align: left;
    white-space: pre-wrap;
  }
  .success { color: #00ff9f; }
  .error   { color: #e63946; }
  .info    { color: #ede4d3; }
  .muted   { color: #6b4a55; }
</style>
</head>
<body>
<div class="box">
  <h1>THE VAULT</h1>
  <div class="sub">ONE-TIME ADMIN HASH SETUP</div>
  <div id="status" class="info">Initializing…</div>
</div>

<script type="module">
import { initializeApp }       from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js';
import { getDatabase, ref, set } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js';

const statusEl = document.getElementById('status');
function log(msg, cls = 'info') {
  statusEl.textContent += (statusEl.textContent.trim() === 'Initializing…' ? '' : '\n') + msg;
  statusEl.className = cls;
}
function clear() { statusEl.textContent = ''; }

const firebaseConfig = {
  apiKey:            'AIzaSyDE64cLcQIKTjgLLIY7Njzdi9mNoIY_lHU',
  authDomain:        'the-vault-88b96.firebaseapp.com',
  databaseURL:       'https://the-vault-88b96-default-rtdb.firebaseio.com',
  projectId:         'the-vault-88b96',
  storageBucket:     'the-vault-88b96.firebasestorage.app',
  messagingSenderId: '840138932766',
  appId:             '1:840138932766:web:a488fb298c276476fb640f',
};

const PLAIN_PASSWORD = 'vault2024';

async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function run() {
  try {
    clear();
    log('→ Initializing Firebase…', 'info');
    const app  = initializeApp(firebaseConfig);
    const db   = getDatabase(app);
    const auth = getAuth(app);

    log('→ Signing in anonymously…', 'info');
    await signInAnonymously(auth);

    log('→ Hashing password with SHA-256…', 'info');
    const hash = await hashPassword(PLAIN_PASSWORD);

    log('→ Writing hash to Firebase at vault-config/adminHash…', 'info');
    await set(ref(db, 'vault-config/adminHash'), hash);

    statusEl.textContent = '';
    log('✓ Admin hash written successfully.', 'success');
    log('', 'success');
    log('You can close this tab and delete setup-admin.html from the repo.', 'success');
    log('', 'success');
    log(`Hash stored: ${hash.slice(0, 16)}…`, 'muted');

  } catch (e) {
    statusEl.textContent = '';
    log('✗ Setup failed.', 'error');
    log('', 'error');
    log(`Error: ${e.message}`, 'error');
    log('', 'error');
    log('Common causes:', 'error');
    log('• Firebase rules blocking the write (check Realtime Database rules)', 'error');
    log('• No internet connection', 'error');
    log('• Firebase project not found or auth not enabled', 'error');
  }
}

run();
</script>
</body>
</html>
